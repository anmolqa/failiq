services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - backend/.env          # contains GEMINI_API_KEY — never committed
    volumes:
      - chroma_data:/app/backend/app/db   # persist knowledge base across restarts
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Use localhost:8000 so the browser (running on the host) can reach the backend
        NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  chroma_data:
